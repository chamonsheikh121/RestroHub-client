<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" fill="#4F46E5" rx="40"/>
  
  <!-- Shopping Cart Icon (for POS/Restaurant) -->
  <g transform="translate(50, 50)">
    <!-- Cart body -->
    <path d="M 20 20 L 25 60 Q 25 65 20 65 L 5 65 Q 0 65 0 60 L 5 20 Z" fill="white" stroke="white" stroke-width="2" stroke-linejoin="round"/>
    <path d="M 80 20 L 75 60 Q 75 65 80 65 L 95 65 Q 100 65 100 60 L 95 20 Z" fill="white" stroke="white" stroke-width="2" stroke-linejoin="round"/>
    
    <!-- Cart handle -->
    <path d="M 5 20 Q 5 5 50 5 Q 95 5 95 20" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Cart top line -->
    <line x1="0" y1="20" x2="100" y2="20" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Fork and Spoon accent -->
  <g transform="translate(130, 60) scale(0.8)">
    <!-- Fork prongs -->
    <line x1="5" y1="5" x2="5" y2="40" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="15" y1="5" x2="15" y2="40" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="5" x2="25" y2="40" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="15" cy="2" rx="12" ry="4" fill="white"/>
  </g>
</svg>